<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Widget</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
  }
  body {
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
  }
  :root {
    --card-bg: #ffffff;
    --card-border: #e5e5e0;
    --icon-bg: #f5f4ef;
    --icon-color: #5f5e5a;
    --text-primary: #2c2c2a;
    --text-secondary: #5f5e5a;
    --text-muted: #888780;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --card-bg: #2a2a28;
      --card-border: #40403c;
      --icon-bg: #363634;
      --icon-color: #d3d1c7;
      --text-primary: #f1efe8;
      --text-secondary: #b4b2a9;
      --text-muted: #888780;
    }
  }
  .card {
    max-width: 340px;
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .top-row { display: flex; align-items: stretch; gap: 16px; }
  .icon-box {
    flex-shrink: 0;
    width: 76px;
    border-radius: 12px;
    background: var(--icon-bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-box svg { width: 44px; height: 44px; color: var(--icon-color); }
  .info-col { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .location { font-size: 13px; color: var(--text-secondary); margin: 0 0 2px; }
  .updated { font-size: 11px; color: var(--text-muted); margin: 0; }
  .temp-row { display: flex; align-items: baseline; gap: 8px; }
  .temp { font-size: 32px; font-weight: 500; color: var(--text-primary); margin: 0; }
  .range { font-size: 13px; color: var(--text-secondary); }
  .stats-row {
    border-top: 0.5px solid var(--card-border);
    margin-top: 14px;
    padding-top: 10px;
    display: flex;
    justify-content: space-between;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); margin: 0 0 2px; }
  .stat-value { font-size: 13px; color: var(--text-primary); margin: 0; }
</style>
</head>
<body>

<div class="card">
  <div class="top-row">
    <div class="icon-box" id="wx-icon-box"></div>
    <div class="info-col">
      <div>
        <p class="location">대구</p>
        <p class="updated" id="wx-updated">불러오는 중…</p>
      </div>
      <div class="temp-row">
        <span class="temp" id="wx-temp">--°</span>
        <span class="range" id="wx-range">최고 --° · 최저 --°</span>
      </div>
    </div>
  </div>
  <div class="stats-row">
    <div>
      <p class="stat-label">체감</p>
      <p class="stat-value" id="wx-feels">--°</p>
    </div>
    <div>
      <p class="stat-label">습도</p>
      <p class="stat-value" id="wx-humidity">--%</p>
    </div>
    <div>
      <p class="stat-label">바람</p>
      <p class="stat-value" id="wx-wind">-- m/s</p>
    </div>
  </div>
</div>

<script>
  // 위치를 바꾸고 싶으면 아래 latitude/longitude/이름만 수정하면 돼
  const LAT = 35.87;
  const LON = 128.60;
  const LOCATION_NAME = "대구";

  document.querySelector('.location').textContent = LOCATION_NAME;

  // 인라인 SVG 아이콘 (외부 폰트 의존 없이 항상 렌더링됨, currentColor로 다크모드 자동 대응)
  const icons = {
    sun: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.2M12 19.3v2.2M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6"/></svg>',
    cloud: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 18a4 4 0 0 1-.4-8 5.5 5.5 0 0 1 10.6-1.8A4.2 4.2 0 0 1 17 18H6.5Z"/></svg>',
    mist: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8h11M4 12h16M6 16h12M4 20h16"/></svg>',
    drizzle: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 13a4 4 0 0 1-.4-8 5.5 5.5 0 0 1 10.6-1.8A4.2 4.2 0 0 1 17 13H6.5Z"/><path d="M8 17.5v1.5M12 17.5v1.5M16 17.5v1.5"/></svg>',
    rain: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 13a4 4 0 0 1-.4-8 5.5 5.5 0 0 1 10.6-1.8A4.2 4.2 0 0 1 17 13H6.5Z"/><path d="M8 17v2.5M12 17v2.5M16 17v2.5"/></svg>',
    snow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 13a4 4 0 0 1-.4-8 5.5 5.5 0 0 1 10.6-1.8A4.2 4.2 0 0 1 17 13H6.5Z"/><path d="M9 17.5l-1 1M9 17.5l1 1M9 17.5v3M15 17.5l-1 1M15 17.5l1 1M15 17.5v3"/></svg>',
    storm: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 12a4 4 0 0 1-.4-8 5.5 5.5 0 0 1 10.6-1.8A4.2 4.2 0 0 1 17 12H6.5Z"/><path d="M13 13l-3 5h3l-2 4"/></svg>'
  };

  const weatherCodeToIcon = {
    0: 'sun', 1: 'sun', 2: 'cloud', 3: 'cloud',
    45: 'mist', 48: 'mist',
    51: 'drizzle', 53: 'drizzle', 55: 'drizzle',
    61: 'rain', 63: 'rain', 65: 'rain',
    71: 'snow', 73: 'snow', 75: 'snow',
    80: 'rain', 81: 'rain', 82: 'rain',
    95: 'storm'
  };

  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul`)
    .then(r => r.json())
    .then(d => {
      const c = d.current;
      document.getElementById('wx-temp').textContent = Math.round(c.temperature_2m) + '°';
      document.getElementById('wx-feels').textContent = Math.round(c.apparent_temperature) + '°';
      document.getElementById('wx-humidity').textContent = Math.round(c.relative_humidity_2m) + '%';
      document.getElementById('wx-wind').textContent = c.wind_speed_10m.toFixed(1) + ' m/s';
      document.getElementById('wx-range').textContent =
        '최고 ' + Math.round(d.daily.temperature_2m_max[0]) + '° · 최저 ' + Math.round(d.daily.temperature_2m_min[0]) + '°';
      const now = new Date();
      document.getElementById('wx-updated').textContent =
        now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0') + ' 기준';
      const iconKey = weatherCodeToIcon[c.weather_code] || 'cloud';
      document.getElementById('wx-icon-box').innerHTML = icons[iconKey];
    })
    .catch(() => {
      document.getElementById('wx-updated').textContent = '불러오기 실패';
      document.getElementById('wx-icon-box').innerHTML = icons.cloud;
    });
</script>

</body>
</html>
